name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 tracker health_tracker

  fast-test:
    name: Fast PR tests - ${{ matrix.group.name }}
    needs: [lint, migration-check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: "Clinical Core Logic"
            tests: >-
              tracker.tests.IngestionServiceTests tracker.tests.CriticalAlertAutoCheckTests
              tracker.tests.MedicationScheduleOverdueTests tracker.tests.HealthReportGenerateTests
              tracker.tests.PredictiveBiomarkerGenerateTests tracker.tests.BiologicalAgeEstimateTests
          - name: "Clinical Workflow Integration"
            tests: >-
              tracker.tests.ViewWithDataTests tracker.tests.Phase2VitalsExtensionTests
              tracker.tests.BulkEditTests tracker.tests.PDFExportTests
              tracker.tests.Phase9DataExportTests tracker.tests.Phase4ProtectedViewTests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ${{ matrix.group.name }} tests
        run: python manage.py test ${{ matrix.group.tests }} --verbosity 2

  migration-check:
    name: Migration graph check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check migrations are in sync
        run: python manage.py makemigrations --check --dry-run

  nightly-extended:
    name: Nightly extended tests
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Report coverage
        run: coverage run manage.py test tracker --verbosity 1 && coverage report

      - name: Run parser drift checks
        run: python test_hl7_fhir.py && python test_parsing.py

  parsing:
    name: Data Parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HL7 & FHIR parsing tests
        run: python test_hl7_fhir.py
