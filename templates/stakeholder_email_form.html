{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Stakeholder Email</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="recipient_name" class="form-label">Recipient Name:</label>
      <input type="text" class="form-control" name="recipient_name" id="recipient_name" value="{% if editing and entry.recipient_name %}{{ entry.recipient_name }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="recipient_email" class="form-label">Recipient Email:</label>
      <input type="email" class="form-control" name="recipient_email" id="recipient_email" value="{% if editing and entry.recipient_email %}{{ entry.recipient_email }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="frequency" class="form-label">Frequency:</label>
      <select class="form-select" name="frequency" id="frequency">
        <option value="weekly" {% if editing and entry.frequency == 'weekly' %}selected{% endif %}>Weekly</option>
        <option value="monthly" {% if editing and entry.frequency == 'monthly' %}selected{% endif %}>Monthly</option>
        <option value="quarterly" {% if editing and entry.frequency == 'quarterly' %}selected{% endif %}>Quarterly</option>
      </select>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing and entry.is_active %}checked{% elif not editing %}checked{% endif %}>
      <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'stakeholder_email_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
