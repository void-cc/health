{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Integration Configuration</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="category" class="form-label">Category:</label>
      <select class="form-select" name="category" id="category">
        {% for value, label in categories %}
        <option value="{{ value }}" {% if editing and entry.category == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="feature_type" class="form-label">Feature Type:</label>
      <select class="form-select" name="feature_type" id="feature_type">
        {% for value, label in feature_types %}
        <option value="{{ value }}" {% if editing and entry.feature_type == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_enabled" id="is_enabled" {% if editing and entry.is_enabled %}checked{% elif not editing %}checked{% endif %}>
      <label for="is_enabled" class="form-check-label">Enabled</label>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'integration_config_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
