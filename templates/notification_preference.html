{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Notification Preferences</h2>
</div>

<div class="container">
  <form method="POST">
    {% csrf_token %}
    <h5>Channels</h5>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="email_enabled" id="email_enabled" {% if pref.email_enabled %}checked{% endif %}>
      <label class="form-check-label" for="email_enabled">Email Notifications</label>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="sms_enabled" id="sms_enabled" {% if pref.sms_enabled %}checked{% endif %}>
      <label class="form-check-label" for="sms_enabled">SMS Notifications</label>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="push_enabled" id="push_enabled" {% if pref.push_enabled %}checked{% endif %}>
      <label class="form-check-label" for="push_enabled">Push Notifications</label>
    </div>

    <h5 class="mt-4">Quiet Hours (UTC)</h5>
    <div class="row">
      <div class="col-md-3 mb-3">
        <label for="quiet_hours_start" class="form-label">Start</label>
        <input type="time" class="form-control" name="quiet_hours_start" id="quiet_hours_start"
               value="{% if pref.quiet_hours_start %}{{ pref.quiet_hours_start|time:'H:i' }}{% endif %}">
      </div>
      <div class="col-md-3 mb-3">
        <label for="quiet_hours_end" class="form-label">End</label>
        <input type="time" class="form-control" name="quiet_hours_end" id="quiet_hours_end"
               value="{% if pref.quiet_hours_end %}{{ pref.quiet_hours_end|time:'H:i' }}{% endif %}">
      </div>
    </div>

    <h5 class="mt-4">Opt Out of Specific Events</h5>
    <p class="text-muted small">Tick the events you do <strong>not</strong> want to receive notifications for.</p>
    {% for value, label in event_types %}
    <div class="mb-1 form-check">
      <input type="checkbox" class="form-check-input" name="disabled_events" id="event_{{ value }}" value="{{ value }}"
             {% if value in pref.disabled_events %}checked{% endif %}>
      <label class="form-check-label" for="event_{{ value }}">{{ label }}</label>
    </div>
    {% endfor %}

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary">Save Preferences</button>
    </div>
  </form>
</div>
{% endblock %}
