{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Sleep Log</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="bedtime" class="form-label">Bedtime:</label>
      <input type="time" class="form-control" name="bedtime" id="bedtime" value="{% if editing and entry.bedtime is not None %}{{ entry.bedtime|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="wake_time" class="form-label">Wake Time:</label>
      <input type="time" class="form-control" name="wake_time" id="wake_time" value="{% if editing and entry.wake_time is not None %}{{ entry.wake_time|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="total_sleep_minutes" class="form-label">Total Sleep (minutes):</label>
      <input type="number" class="form-control" name="total_sleep_minutes" id="total_sleep_minutes" value="{% if editing and entry.total_sleep_minutes is not None %}{{ entry.total_sleep_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="rem_minutes" class="form-label">REM (minutes):</label>
      <input type="number" class="form-control" name="rem_minutes" id="rem_minutes" value="{% if editing and entry.rem_minutes is not None %}{{ entry.rem_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="deep_sleep_minutes" class="form-label">Deep Sleep (minutes):</label>
      <input type="number" class="form-control" name="deep_sleep_minutes" id="deep_sleep_minutes" value="{% if editing and entry.deep_sleep_minutes is not None %}{{ entry.deep_sleep_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="light_sleep_minutes" class="form-label">Light Sleep (minutes):</label>
      <input type="number" class="form-control" name="light_sleep_minutes" id="light_sleep_minutes" value="{% if editing and entry.light_sleep_minutes is not None %}{{ entry.light_sleep_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="awake_minutes" class="form-label">Awake (minutes):</label>
      <input type="number" class="form-control" name="awake_minutes" id="awake_minutes" value="{% if editing and entry.awake_minutes is not None %}{{ entry.awake_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="sleep_quality_score" class="form-label">Sleep Quality Score:</label>
      <input type="number" class="form-control" name="sleep_quality_score" id="sleep_quality_score" step="0.1" value="{% if editing and entry.sleep_quality_score is not None %}{{ entry.sleep_quality_score }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'sleep_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
