{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} User Profile</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="username" class="form-label">Username:</label>
      <input type="text" class="form-control" name="username" id="username" value="{% if editing and entry.username %}{{ entry.username }}{% endif %}" required />
    </div>
    <div class="mb-3">
      <label for="role" class="form-label">Role:</label>
      <select class="form-select" name="role" id="role">
        <option value="admin" {% if editing and entry.role == 'admin' %}selected{% endif %}>Administrator</option>
        <option value="user" {% if editing and entry.role == 'user' %}selected{% endif %}>Standard User</option>
        <option value="practitioner" {% if editing and entry.role == 'practitioner' %}selected{% endif %}>Medical Practitioner</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="language" class="form-label">{% trans "Language" %}:</label>
      <select class="form-select" name="language" id="language">
        <option value="en" {% if editing and entry.language == 'en' %}selected{% endif %}>{% trans "English" %}</option>
        <option value="fr" {% if editing and entry.language == 'fr' %}selected{% endif %}>{% trans "French" %}</option>
        <option value="de" {% if editing and entry.language == 'de' %}selected{% endif %}>{% trans "German" %}</option>
        <option value="es" {% if editing and entry.language == 'es' %}selected{% endif %}>{% trans "Spanish" %}</option>
      </select>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing and entry.is_active %}checked{% elif not editing %}checked{% endif %}>
      <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'user_profile_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
    </div>
  </form>
</div>
{% endblock %}
