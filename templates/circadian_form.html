{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Circadian Rhythm Log</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="wake_time" class="form-label">Wake Time:</label>
      <input type="time" class="form-control" name="wake_time" id="wake_time" value="{% if editing and entry.wake_time is not None %}{{ entry.wake_time|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="sleep_onset" class="form-label">Sleep Onset:</label>
      <input type="time" class="form-control" name="sleep_onset" id="sleep_onset" value="{% if editing and entry.sleep_onset is not None %}{{ entry.sleep_onset|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="peak_energy_time" class="form-label">Peak Energy Time:</label>
      <input type="time" class="form-control" name="peak_energy_time" id="peak_energy_time" value="{% if editing and entry.peak_energy_time is not None %}{{ entry.peak_energy_time|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="lowest_energy_time" class="form-label">Lowest Energy Time:</label>
      <input type="time" class="form-control" name="lowest_energy_time" id="lowest_energy_time" value="{% if editing and entry.lowest_energy_time is not None %}{{ entry.lowest_energy_time|time:'H:i' }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="light_exposure_minutes" class="form-label">Light Exposure (minutes):</label>
      <input type="number" class="form-control" name="light_exposure_minutes" id="light_exposure_minutes" value="{% if editing and entry.light_exposure_minutes is not None %}{{ entry.light_exposure_minutes }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'circadian_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
