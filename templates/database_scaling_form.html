{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Database Scaling Config</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="config_name" class="form-label">Config Name:</label>
      <input type="text" class="form-control" name="config_name" id="config_name" value="{% if editing and entry.config_name %}{{ entry.config_name }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="scaling_type" class="form-label">Scaling Type:</label>
      <select class="form-select" name="scaling_type" id="scaling_type">
        <option value="read_replica" {% if editing and entry.scaling_type == 'read_replica' %}selected{% endif %}>Read Replica</option>
        <option value="sharding" {% if editing and entry.scaling_type == 'sharding' %}selected{% endif %}>Data Sharding</option>
        <option value="partitioning" {% if editing and entry.scaling_type == 'partitioning' %}selected{% endif %}>Table Partitioning</option>
      </select>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing and entry.is_active %}checked{% endif %} />
      <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="mb-3">
      <label for="max_connections" class="form-label">Max Connections:</label>
      <input type="number" class="form-control" name="max_connections" id="max_connections" value="{% if editing %}{{ entry.max_connections }}{% else %}100{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'database_scaling_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
