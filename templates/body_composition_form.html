{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Body Composition</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="body_fat_percentage" class="form-label">Body Fat (%):</label>
      <input type="number" step="0.1" class="form-control" name="body_fat_percentage" id="body_fat_percentage" value="{% if editing and entry.body_fat_percentage is not None %}{{ entry.body_fat_percentage }}{% endif %}" placeholder="e.g. 18.5" />
    </div>

    <div class="mb-3">
      <label for="skeletal_muscle_mass" class="form-label">Skeletal Muscle Mass (kg):</label>
      <input type="number" step="0.1" class="form-control" name="skeletal_muscle_mass" id="skeletal_muscle_mass" value="{% if editing and entry.skeletal_muscle_mass is not None %}{{ entry.skeletal_muscle_mass }}{% endif %}" placeholder="e.g. 30.0" />
    </div>

    <div class="mb-3">
      <label for="bone_density" class="form-label">Bone Density (g/cm²):</label>
      <input type="number" step="0.01" class="form-control" name="bone_density" id="bone_density" value="{% if editing and entry.bone_density is not None %}{{ entry.bone_density }}{% endif %}" placeholder="e.g. 1.2" />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="waist_circumference" class="form-label">Waist Circumference (cm):</label>
        <input type="number" step="0.1" class="form-control" name="waist_circumference" id="waist_circumference" value="{% if editing and entry.waist_circumference is not None %}{{ entry.waist_circumference }}{% endif %}" placeholder="e.g. 80" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="hip_circumference" class="form-label">Hip Circumference (cm):</label>
        <input type="number" step="0.1" class="form-control" name="hip_circumference" id="hip_circumference" value="{% if editing and entry.hip_circumference is not None %}{{ entry.hip_circumference }}{% endif %}" placeholder="e.g. 95" />
      </div>
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'body_composition_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
