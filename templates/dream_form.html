{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Dream Journal</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="dream_description" class="form-label">Dream Description:</label>
      <textarea class="form-control" name="dream_description" id="dream_description" rows="5">{% if editing and entry.dream_description %}{{ entry.dream_description }}{% endif %}</textarea>
    </div>

    <div class="mb-3">
      <label for="lucidity_level" class="form-label">Lucidity Level (0-5):</label>
      <input type="number" class="form-control" name="lucidity_level" id="lucidity_level" min="0" max="5" value="{% if editing and entry.lucidity_level is not None %}{{ entry.lucidity_level }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="mood_on_waking" class="form-label">Mood on Waking:</label>
      <input type="text" class="form-control" name="mood_on_waking" id="mood_on_waking" value="{% if editing and entry.mood_on_waking %}{{ entry.mood_on_waking }}{% endif %}" />
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'dream_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
