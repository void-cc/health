{% extends 'base.html' %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-header-title">Add Blood Test Reference</h1>
    <p class="page-header-subtitle">Define a new blood test type with its normal range</p>
  </div>
</div>

<div class="form-card">
  <form method="POST" class="validated-form">
    {% csrf_token %}

    <div class="form-group-row">
      <label for="test_name" class="form-label">
        Test Name <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
      </label>
      <input type="text" class="form-control" name="test_name" id="test_name" required placeholder="e.g. Hemoglobin" />
    </div>

    <div class="form-group-row">
      <label for="unit" class="form-label">
        Unit <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
      </label>
      <input type="text" class="form-control" name="unit" id="unit" required placeholder="e.g. g/dL" />
    </div>

    <div class="row g-3">
      <div class="col-md-6 form-group-row">
        <label for="normal_min" class="form-label">
          Normal Min <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
        </label>
        <input type="number" step="any" class="form-control" name="normal_min" id="normal_min" required placeholder="e.g. 12.0" />
      </div>
      <div class="col-md-6 form-group-row">
        <label for="normal_max" class="form-label">
          Normal Max <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
        </label>
        <input type="number" step="any" class="form-control" name="normal_max" id="normal_max" required placeholder="e.g. 17.5" />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        <i data-lucide="plus" class="me-1" aria-hidden="true"></i> Add Test Reference
      </button>
      <a href="{% url 'index' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
