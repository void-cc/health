{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Pain Log</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="body_region" class="form-label">Body Region:</label>
      <select class="form-select" name="body_region" id="body_region" required>
        <option value="">-- Select region --</option>
        {% for value, label in body_regions %}
        <option value="{{ value }}" {% if editing and entry.body_region == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="pain_level" class="form-label">Pain Level (1-10):</label>
      <input type="number" class="form-control" name="pain_level" id="pain_level" min="1" max="10" value="{% if editing %}{{ entry.pain_level }}{% else %}1{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description:</label>
      <textarea class="form-control" name="description" id="description" rows="3">{% if editing and entry.description %}{{ entry.description }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'pain_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
