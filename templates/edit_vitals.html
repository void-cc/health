{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">Edit Vital Signs</h2>
  <form method="POST">
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{{ vital.date.strftime('%Y-%m-%d') }}" required />
    </div>

    <div class="mb-3">
      <label for="weight" class="form-label">Weight (kg):</label>
      <input type="number" step="0.1" class="form-control" name="weight" id="weight" value="{{ vital.weight if vital.weight is not none else '' }}" />
    </div>

    <div class="mb-3">
      <label for="heart_rate" class="form-label">Heart Rate (bpm):</label>
      <input type="number" class="form-control" name="heart_rate" id="heart_rate" value="{{ vital.heart_rate if vital.heart_rate is not none else '' }}" />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="systolic_bp" class="form-label">Systolic BP (mmHg):</label>
        <input type="number" class="form-control" name="systolic_bp" id="systolic_bp" value="{{ vital.systolic_bp if vital.systolic_bp is not none else '' }}" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="diastolic_bp" class="form-label">Diastolic BP (mmHg):</label>
        <input type="number" class="form-control" name="diastolic_bp" id="diastolic_bp" value="{{ vital.diastolic_bp if vital.diastolic_bp is not none else '' }}" />
      </div>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">Update Vitals</button>
      <a href="{% url 'vitals' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
