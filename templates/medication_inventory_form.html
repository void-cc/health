{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:640px;">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{% url 'medication_inventory_list' %}" class="btn btn-outline-secondary btn-sm" aria-label="Back">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
    </a>
    <h2 class="mb-0 fw-semibold" style="font-size:1.125rem;">{% if editing %}Edit{% else %}Add{% endif %} Inventory Entry</h2>
  </div>
  <div class="card" style="border:1px solid var(--border-color);">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label for="schedule" class="form-label" style="font-size:0.8125rem;">Linked Schedule <span class="text-muted">(optional)</span></label>
          <select class="form-select form-select-sm" name="schedule" id="schedule">
            <option value="">— No schedule —</option>
            {% for s in schedules %}
            <option value="{{ s.id }}"
              {% if editing and entry.schedule_id == s.id %}selected{% endif %}>
              {{ s.medication_name }} ({{ s.dosage }})
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label for="medication_name" class="form-label" style="font-size:0.8125rem;">Medication Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-sm" id="medication_name" name="medication_name"
            value="{% if editing %}{{ entry.medication_name }}{% endif %}" required>
        </div>

        <hr class="my-3" style="border-color:var(--border-color);">

        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label for="current_count" class="form-label" style="font-size:0.8125rem;">Current Count <span class="text-danger">*</span></label>
            <input type="number" class="form-control form-control-sm" id="current_count" name="current_count" min="0"
              value="{% if editing %}{{ entry.current_count }}{% else %}0{% endif %}" required>
          </div>
          <div class="col-md-4">
            <label for="units_per_dose" class="form-label" style="font-size:0.8125rem;">Units per Dose</label>
            <input type="number" class="form-control form-control-sm" id="units_per_dose" name="units_per_dose" min="0.1" step="0.1"
              value="{% if editing %}{{ entry.units_per_dose }}{% else %}1{% endif %}">
          </div>
          <div class="col-md-4">
            <label for="refill_reminder_threshold" class="form-label" style="font-size:0.8125rem;">Refill Reminder</label>
            <input type="number" class="form-control form-control-sm" id="refill_reminder_threshold" name="refill_reminder_threshold" min="0"
              value="{% if editing %}{{ entry.refill_reminder_threshold }}{% else %}7{% endif %}">
            <div class="form-text" style="font-size:0.6875rem;">Alert when stock drops below this.</div>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="last_refill_date" class="form-label" style="font-size:0.8125rem;">Last Refill Date</label>
            <input type="date" class="form-control form-control-sm" id="last_refill_date" name="last_refill_date"
              value="{% if editing and entry.last_refill_date %}{{ entry.last_refill_date|date:'Y-m-d' }}{% endif %}">
          </div>
          <div class="col-md-6">
            <label for="expiration_date" class="form-label" style="font-size:0.8125rem;">Expiration Date</label>
            <input type="date" class="form-control form-control-sm" id="expiration_date" name="expiration_date"
              value="{% if editing and entry.expiration_date %}{{ entry.expiration_date|date:'Y-m-d' }}{% endif %}">
          </div>
        </div>

        <hr class="my-3" style="border-color:var(--border-color);">

        <div class="mb-3">
          <label for="pharmacy_name" class="form-label" style="font-size:0.8125rem;">Pharmacy</label>
          <input type="text" class="form-control form-control-sm" id="pharmacy_name" name="pharmacy_name"
            value="{% if editing %}{{ entry.pharmacy_name }}{% endif %}" placeholder="e.g. CVS Pharmacy">
        </div>

        <div class="mb-3">
          <label for="notes" class="form-label" style="font-size:0.8125rem;">Notes</label>
          <textarea class="form-control form-control-sm" id="notes" name="notes" rows="3">{% if editing %}{{ entry.notes }}{% endif %}</textarea>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="{% url 'medication_inventory_list' %}" class="btn btn-secondary btn-sm">Cancel</a>
          <button type="submit" class="btn btn-primary btn-sm">{% if editing %}Update{% else %}Save{% endif %}</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const scheduleData = {
    {% for s in schedules %}
    "{{ s.id }}": {"name": "{{ s.medication_name|escapejs }}"},
    {% endfor %}
  };
  document.getElementById('schedule').addEventListener('change', function () {
    const sel = this.value;
    if (sel && scheduleData[sel]) {
      const nameField = document.getElementById('medication_name');
      if (!nameField.value || Object.values(scheduleData).some(d => d.name === nameField.value)) {
        nameField.value = scheduleData[sel].name;
      }
    }
  });
</script>
{% endblock %}
