{% extends 'base.html' %}
{% block content %}
<div class="container my-4">
  <h2 class="mb-4">{% if editing %}<i class="fas fa-edit me-2"></i>Edit Predictive Model{% else %}<i class="fas fa-plus me-2"></i>Add Predictive Model{% endif %}</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="name" class="form-label">Model Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ entry.name|default:'' }}" required>
          </div>
          <div class="col-md-3 mb-3">
            <label for="category" class="form-label">Category</label>
            <select class="form-select" id="category" name="category" required>
              <option value="">Select Category</option>
              {% for value, label in categories %}
              <option value="{{ value }}" {% if entry.category == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label for="model_type" class="form-label">Model Type</label>
            <select class="form-select" id="model_type" name="model_type">
              <option value="regression" {% if entry.model_type == 'regression' %}selected{% endif %}>Regression</option>
              <option value="classification" {% if entry.model_type == 'classification' %}selected{% endif %}>Classification</option>
              <option value="clustering" {% if entry.model_type == 'clustering' %}selected{% endif %}>Clustering</option>
              <option value="time_series" {% if entry.model_type == 'time_series' %}selected{% endif %}>Time Series</option>
              <option value="anomaly" {% if entry.model_type == 'anomaly' %}selected{% endif %}>Anomaly Detection</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label for="target_metric" class="form-label">Target Metric</label>
            <input type="text" class="form-control" id="target_metric" name="target_metric" value="{{ entry.target_metric|default:'' }}" placeholder="e.g., Blood Glucose, Heart Rate">
          </div>
          <div class="col-md-4 mb-3">
            <label for="accuracy_score" class="form-label">Accuracy Score (%)</label>
            <input type="number" step="0.1" min="0" max="100" class="form-control" id="accuracy_score" name="accuracy_score" value="{{ entry.accuracy_score|default:'' }}">
          </div>
          <div class="col-md-4 mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status">
              <option value="draft" {% if entry.status == 'draft' %}selected{% endif %}>Draft</option>
              <option value="training" {% if entry.status == 'training' %}selected{% endif %}>Training</option>
              <option value="active" {% if entry.status == 'active' %}selected{% endif %}>Active</option>
              <option value="deprecated" {% if entry.status == 'deprecated' %}selected{% endif %}>Deprecated</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea class="form-control" id="description" name="description" rows="3">{{ entry.description|default:'' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Model</button>
          <a href="{% url 'predictive_model_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
