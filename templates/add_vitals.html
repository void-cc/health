{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">Add Vital Signs</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{{ date }}" required />
    </div>

    <div class="mb-3">
      <label for="weight" class="form-label">Weight (kg):</label>
      <input type="number" step="0.1" class="form-control" name="weight" id="weight" placeholder="e.g. 70.5" />
    </div>

    <div class="mb-3">
      <label for="heart_rate" class="form-label">Heart Rate (bpm):</label>
      <input type="number" class="form-control" name="heart_rate" id="heart_rate" placeholder="e.g. 72" />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="systolic_bp" class="form-label">Systolic BP (mmHg):</label>
        <input type="number" class="form-control" name="systolic_bp" id="systolic_bp" placeholder="e.g. 120" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="diastolic_bp" class="form-label">Diastolic BP (mmHg):</label>
        <input type="number" class="form-control" name="diastolic_bp" id="diastolic_bp" placeholder="e.g. 80" />
      </div>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">Save Vitals</button>
      <a href="{% url 'vitals' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
