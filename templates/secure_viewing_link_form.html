{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Secure Viewing Link</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="token" class="form-label">Token</label>
      <input type="text" class="form-control" name="token" id="token" value="{% if editing and entry.token %}{{ entry.token }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="data_types" class="form-label">Data Types</label>
      <input type="text" class="form-control" name="data_types" id="data_types" value="{% if editing and entry.data_types %}{{ entry.data_types }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="expires_at" class="form-label">Expires At</label>
      <input type="datetime-local" class="form-control" name="expires_at" id="expires_at" value="{% if editing and entry.expires_at %}{{ entry.expires_at|date:'Y-m-d\TH:i' }}{% endif %}" />
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing %}{% if entry.is_active %}checked{% endif %}{% else %}checked{% endif %} />
      <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'secure_viewing_link_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
