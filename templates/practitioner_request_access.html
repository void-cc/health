{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Access - Practitioner Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
<div class="container my-5">
  <h2 class="mb-4 text-center">Request Patient Data Access</h2>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="practitioner_name" class="form-label">Your Name:</label>
              <input type="text" class="form-control" name="practitioner_name" id="practitioner_name" required placeholder="Dr. Smith" />
            </div>
            <div class="mb-3">
              <label for="practitioner_email" class="form-label">Your Email:</label>
              <input type="email" class="form-control" name="practitioner_email" id="practitioner_email" required placeholder="doctor@example.com" />
            </div>
            <div class="mb-3">
              <label for="specialty" class="form-label">Specialty:</label>
              <input type="text" class="form-control" name="specialty" id="specialty" placeholder="e.g., Cardiology" />
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit Access Request</button>
          </form>
          <div class="mt-3 text-center">
            <a href="{% url 'practitioner_portal' %}" class="btn btn-outline-secondary">Back to Portal</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
