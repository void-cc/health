{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Tenant Configuration</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="tenant_name" class="form-label">Tenant Name:</label>
      <input type="text" class="form-control" name="tenant_name" id="tenant_name" value="{% if editing and entry.tenant_name %}{{ entry.tenant_name }}{% endif %}" />
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing and entry.is_active %}checked{% elif not editing %}checked{% endif %}>
      <label for="is_active" class="form-check-label">Active</label>
    </div>
    <div class="mb-3">
      <label for="data_isolation_level" class="form-label">Data Isolation Level:</label>
      <input type="text" class="form-control" name="data_isolation_level" id="data_isolation_level" value="{% if editing and entry.data_isolation_level %}{{ entry.data_isolation_level }}{% else %}full{% endif %}" />
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'tenant_config_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
