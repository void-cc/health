{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:640px;">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{% url 'medication_log_list' %}" class="btn btn-outline-secondary btn-sm" aria-label="Back">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
    </a>
    <h2 class="mb-0 fw-semibold" style="font-size:1.125rem;">{% if editing %}Edit{% else %}Log{% endif %} Dose</h2>
  </div>
  <div class="card" style="border:1px solid var(--border-color);">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label for="schedule" class="form-label" style="font-size:0.8125rem;">Linked Schedule <span class="text-muted">(optional)</span></label>
          <select class="form-select form-select-sm" name="schedule" id="schedule">
            <option value="">— No schedule —</option>
            {% for s in schedules %}
            <option value="{{ s.id }}"
              {% if editing and entry.schedule_id == s.id %}selected
              {% elif not editing and preselected and preselected.id == s.id %}selected
              {% endif %}>
              {{ s.medication_name }} ({{ s.dosage }})
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="medication_name" class="form-label" style="font-size:0.8125rem;">Medication Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-sm" id="medication_name" name="medication_name"
              value="{% if editing %}{{ entry.medication_name }}{% elif preselected %}{{ preselected.medication_name }}{% endif %}" required>
          </div>
          <div class="col-md-6">
            <label for="dosage" class="form-label" style="font-size:0.8125rem;">Dosage</label>
            <input type="text" class="form-control form-control-sm" id="dosage" name="dosage"
              value="{% if editing %}{{ entry.dosage }}{% elif preselected %}{{ preselected.dosage }}{% endif %}" placeholder="e.g. 500mg">
          </div>
        </div>

        <hr class="my-3" style="border-color:var(--border-color);">

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label for="taken_at" class="form-label" style="font-size:0.8125rem;">Taken At <span class="text-danger">*</span></label>
            <input type="datetime-local" class="form-control form-control-sm" id="taken_at" name="taken_at"
              value="{% if editing %}{{ entry.taken_at|date:'Y-m-d' }}T{{ entry.taken_at|time:'H:i' }}{% else %}{{ now }}{% endif %}" required>
          </div>
          <div class="col-md-6">
            <label for="scheduled_time" class="form-label" style="font-size:0.8125rem;">Scheduled Time <span class="text-muted">(optional)</span></label>
            <input type="datetime-local" class="form-control form-control-sm" id="scheduled_time" name="scheduled_time"
              value="{% if editing and entry.scheduled_time %}{{ entry.scheduled_time|date:'Y-m-d' }}T{{ entry.scheduled_time|time:'H:i' }}{% endif %}">
          </div>
        </div>

        <div class="mb-3">
          <label for="status" class="form-label" style="font-size:0.8125rem;">Status <span class="text-danger">*</span></label>
          <select class="form-select form-select-sm" name="status" id="status">
            {% for val, label in status_choices %}
            <option value="{{ val }}" {% if editing and entry.status == val %}selected{% elif not editing and val == 'taken' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3" id="skip_reason_row">
          <label for="skip_reason" class="form-label" style="font-size:0.8125rem;">Skip Reason</label>
          <input type="text" class="form-control form-control-sm" id="skip_reason" name="skip_reason"
            value="{% if editing %}{{ entry.skip_reason }}{% endif %}" placeholder="e.g. Forgot, Side effect, Out of stock">
        </div>

        <hr class="my-3" style="border-color:var(--border-color);">

        <div class="mb-3">
          <label for="side_effects" class="form-label" style="font-size:0.8125rem;">Side Effects / Symptoms</label>
          <textarea class="form-control form-control-sm" id="side_effects" name="side_effects" rows="2" placeholder="Describe any side effects…">{% if editing %}{{ entry.side_effects }}{% endif %}</textarea>
        </div>

        <div class="mb-3">
          <label for="notes" class="form-label" style="font-size:0.8125rem;">Notes</label>
          <textarea class="form-control form-control-sm" id="notes" name="notes" rows="2">{% if editing %}{{ entry.notes }}{% endif %}</textarea>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="{% url 'medication_log_list' %}" class="btn btn-secondary btn-sm">Cancel</a>
          <button type="submit" class="btn btn-primary btn-sm">{% if editing %}Update{% else %}Save{% endif %}</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const scheduleData = {
    {% for s in schedules %}
    "{{ s.id }}": {"name": "{{ s.medication_name|escapejs }}", "dosage": "{{ s.dosage|escapejs }}"},
    {% endfor %}
  };
  document.getElementById('schedule').addEventListener('change', function () {
    const sel = this.value;
    if (sel && scheduleData[sel]) {
      const nameField = document.getElementById('medication_name');
      const dosageField = document.getElementById('dosage');
      if (!nameField.value || Object.values(scheduleData).some(d => d.name === nameField.value)) {
        nameField.value = scheduleData[sel].name;
      }
      if (!dosageField.value || Object.values(scheduleData).some(d => d.dosage === dosageField.value)) {
        dosageField.value = scheduleData[sel].dosage;
      }
    }
  });
</script>
{% endblock %}
