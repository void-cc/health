{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center"><i class="fas fa-clipboard-check"></i> {% if editing %}Edit{% else %}Log{% endif %} Dose</h2>
  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <label for="schedule" class="form-label">Linked Schedule <span class="text-muted small">(optional)</span></label>
      <select class="form-select" name="schedule" id="schedule">
        <option value="">— No schedule —</option>
        {% for s in schedules %}
        <option value="{{ s.id }}"
          {% if editing and entry.schedule_id == s.id %}selected
          {% elif not editing and preselected and preselected.id == s.id %}selected
          {% endif %}>
          {{ s.medication_name }} ({{ s.dosage }})
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="medication_name" class="form-label">Medication Name <span class="text-danger">*</span></label>
      <input type="text" class="form-control" id="medication_name" name="medication_name"
        value="{% if editing %}{{ entry.medication_name }}{% elif preselected %}{{ preselected.medication_name }}{% endif %}" required>
    </div>

    <div class="mb-3">
      <label for="dosage" class="form-label">Dosage</label>
      <input type="text" class="form-control" id="dosage" name="dosage"
        value="{% if editing %}{{ entry.dosage }}{% elif preselected %}{{ preselected.dosage }}{% endif %}" placeholder="e.g. 500mg">
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label for="taken_at" class="form-label">Taken At <span class="text-danger">*</span></label>
        <input type="datetime-local" class="form-control" id="taken_at" name="taken_at"
          value="{% if editing %}{{ entry.taken_at|date:'Y-m-d' }}T{{ entry.taken_at|time:'H:i' }}{% else %}{{ now }}{% endif %}" required>
      </div>
      <div class="col-md-6">
        <label for="scheduled_time" class="form-label">Scheduled Time <span class="text-muted small">(optional)</span></label>
        <input type="datetime-local" class="form-control" id="scheduled_time" name="scheduled_time"
          value="{% if editing and entry.scheduled_time %}{{ entry.scheduled_time|date:'Y-m-d' }}T{{ entry.scheduled_time|time:'H:i' }}{% endif %}">
      </div>
    </div>

    <div class="mb-3">
      <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
      <select class="form-select" name="status" id="status">
        {% for val, label in status_choices %}
        <option value="{{ val }}" {% if editing and entry.status == val %}selected{% elif not editing and val == 'taken' %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3" id="skip_reason_row">
      <label for="skip_reason" class="form-label">Skip Reason</label>
      <input type="text" class="form-control" id="skip_reason" name="skip_reason"
        value="{% if editing %}{{ entry.skip_reason }}{% endif %}" placeholder="e.g. Forgot, Side effect, Out of stock">
    </div>

    <div class="mb-3">
      <label for="side_effects" class="form-label">Side Effects / Symptoms</label>
      <textarea class="form-control" id="side_effects" name="side_effects" rows="2" placeholder="Describe any side effects experienced...">{% if editing %}{{ entry.side_effects }}{% endif %}</textarea>
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes</label>
      <textarea class="form-control" id="notes" name="notes" rows="2">{% if editing %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'medication_log_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
  // Auto-fill medication name/dosage when a schedule is selected
  const scheduleData = {
    {% for s in schedules %}
    "{{ s.id }}": {"name": "{{ s.medication_name|escapejs }}", "dosage": "{{ s.dosage|escapejs }}"},
    {% endfor %}
  };
  document.getElementById('schedule').addEventListener('change', function () {
    const sel = this.value;
    if (sel && scheduleData[sel]) {
      const nameField = document.getElementById('medication_name');
      const dosageField = document.getElementById('dosage');
      if (!nameField.value || Object.values(scheduleData).some(d => d.name === nameField.value)) {
        nameField.value = scheduleData[sel].name;
      }
      if (!dosageField.value || Object.values(scheduleData).some(d => d.dosage === dosageField.value)) {
        dosageField.value = scheduleData[sel].dosage;
      }
    }
  });
</script>
{% endblock %}
