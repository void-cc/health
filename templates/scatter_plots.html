{% extends 'base.html' %}
{% load json_filters %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Correlative Scatter Plots</h2>
  <a href="{% url 'index' %}" class="btn btn-secondary">Back to Dashboard</a>
</div>

{% if metric_names|length >= 2 %}
<div class="card mb-4">
  <div class="card-body">
    <div class="row">
      <div class="col-md-5">
        <label for="xMetric" class="form-label"><strong>X-Axis Metric:</strong></label>
        <select id="xMetric" class="form-select">
          {% for name in metric_names %}
            <option value="{{ name }}" {% if forloop.first %}selected{% endif %}>{{ name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-5">
        <label for="yMetric" class="form-label"><strong>Y-Axis Metric:</strong></label>
        <select id="yMetric" class="form-select">
          {% for name in metric_names %}
            <option value="{{ name }}" {% if forloop.counter == 2 %}selected{% endif %}>{{ name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button id="plotBtn" class="btn btn-primary w-100">Plot</button>
      </div>
    </div>
  </div>
</div>

<div style="position: relative; height:50vh; width:100%">
  <canvas id="scatterChart"></canvas>
</div>
{% else %}
<div class="alert alert-info">At least two different metrics are needed for scatter plots. Add more blood tests or vital signs.</div>
{% endif %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script>
  var allMetrics = {{ metrics|tojson }};
  var scatterChart = null;

  function buildScatterData(xName, yName) {
    var xData = allMetrics[xName] || [];
    var yData = allMetrics[yName] || [];

    // Build date-keyed lookup for Y metric
    var yByDate = {};
    for (var i = 0; i < yData.length; i++) {
      yByDate[yData[i].date] = yData[i].value;
    }

    // Match by date
    var points = [];
    for (var j = 0; j < xData.length; j++) {
      var d = xData[j].date;
      if (yByDate[d] !== undefined) {
        points.push({ x: xData[j].value, y: yByDate[d] });
      }
    }
    return points;
  }

  function renderScatter() {
    var xName = document.getElementById('xMetric').value;
    var yName = document.getElementById('yMetric').value;
    var points = buildScatterData(xName, yName);

    if (scatterChart) {
      scatterChart.destroy();
    }

    var ctx = document.getElementById('scatterChart').getContext('2d');
    scatterChart = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [{
          label: xName + ' vs ' + yName,
          data: points,
          backgroundColor: 'rgba(54, 162, 235, 0.6)',
          borderColor: 'rgba(54, 162, 235, 1)',
          pointRadius: 6,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          xAxes: [{
            scaleLabel: { display: true, labelString: xName }
          }],
          yAxes: [{
            scaleLabel: { display: true, labelString: yName }
          }]
        },
        tooltips: {
          callbacks: {
            label: function(item) {
              return xName + ': ' + item.xLabel + ', ' + yName + ': ' + item.yLabel;
            }
          }
        }
      }
    });
  }

  document.getElementById('plotBtn').addEventListener('click', renderScatter);
  // Initial render
  renderScatter();
</script>
{% endblock %}
