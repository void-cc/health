{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Medication Schedule</h2>
  <form method="POST" id="medScheduleForm">
    {% csrf_token %}
    {# Hidden field to carry the resolved RxCUI back to the server #}
    <input type="hidden" id="rxcui" name="rxcui" value="{% if editing %}{{ entry.rxcui }}{% endif %}">
    <div class="mb-3 position-relative">
      <label for="medication_name" class="form-label">Medication Name:</label>
      <input type="text" class="form-control" id="medication_name" name="medication_name"
             value="{% if editing %}{{ entry.medication_name }}{% endif %}"
             autocomplete="off" required>
      <ul id="med-autocomplete-list" class="list-group position-absolute w-100 shadow" style="z-index:1000;display:none;"></ul>
    </div>
    <div class="mb-3">
      <label for="dosage" class="form-label">Dosage:</label>
      <input type="text" class="form-control" id="dosage" name="dosage" value="{% if editing %}{{ entry.dosage }}{% endif %}">
    </div>
    <div class="mb-3">
      <label for="frequency" class="form-label">Frequency:</label>
      <input type="text" class="form-control" id="frequency" name="frequency" value="{% if editing %}{{ entry.frequency }}{% endif %}">
    </div>
    <div class="mb-3">
      <label for="start_date" class="form-label">Start Date:</label>
      <input type="date" class="form-control" id="start_date" name="start_date" value="{% if editing %}{{ entry.start_date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required>
    </div>
    <div class="mb-3">
      <label for="end_date" class="form-label">End Date:</label>
      <input type="date" class="form-control" id="end_date" name="end_date" value="{% if editing and entry.end_date %}{{ entry.end_date|date:'Y-m-d' }}{% endif %}">
    </div>
    <div class="mb-3">
      <label for="time_of_day" class="form-label">Time of Day:</label>
      <input type="time" class="form-control" id="time_of_day" name="time_of_day" value="{% if editing and entry.time_of_day is not None %}{{ entry.time_of_day|time:'H:i' }}{% endif %}">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_active" id="is_active" {% if editing and entry.is_active %}checked{% elif not editing %}checked{% endif %}>
      <label class="form-check-label" for="is_active">Active</label>
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" id="notes" name="notes" rows="3">{% if editing %}{{ entry.notes }}{% endif %}</textarea>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'medication_schedule_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
(function () {
  const input = document.getElementById('medication_name');
  const list  = document.getElementById('med-autocomplete-list');
  const rxcuiField = document.getElementById('rxcui');
  let debounceTimer;

  input.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    const q = this.value.trim();
    if (q.length < 2) { list.style.display = 'none'; return; }
    debounceTimer = setTimeout(() => {
      fetch('{% url "medication_autocomplete" %}?q=' + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
          list.innerHTML = '';
          if (!data.results || data.results.length === 0) { list.style.display = 'none'; return; }
          data.results.forEach(item => {
            const li = document.createElement('li');
            li.className = 'list-group-item list-group-item-action';
            li.textContent = item.name;
            li.dataset.rxcui = item.rxcui || '';
            li.addEventListener('mousedown', function (e) {
              e.preventDefault();
              input.value = this.textContent;
              rxcuiField.value = this.dataset.rxcui;
              list.style.display = 'none';
            });
            list.appendChild(li);
          });
          list.style.display = 'block';
        })
        .catch(() => { list.style.display = 'none'; });
    }, 300);
  });

  document.addEventListener('click', function (e) {
    if (e.target !== input) { list.style.display = 'none'; }
  });
})();
</script>
{% endblock %}
