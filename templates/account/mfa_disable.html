{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-warning">
      <div class="card-header bg-warning text-dark">
        <i class="fas fa-exclamation-triangle"></i> Disable Two-Factor Authentication
      </div>
      <div class="card-body">
        <div class="alert alert-warning">
          <i class="fas fa-shield-alt"></i>
          <strong>Warning:</strong> Disabling two-factor authentication will make your account less secure. You will only need your password to sign in.
        </div>

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="d-flex justify-content-between">
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left"></i> Cancel
            </a>
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-times-circle"></i> Disable MFA
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
