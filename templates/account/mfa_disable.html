{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="account-card">
      <div class="account-card-header account-card-header-warning">
        <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
        <span>Disable Two-Factor Authentication</span>
      </div>
      <div class="account-card-body">
        <div class="auth-warning-box">
          🛡 <strong>Warning:</strong> Disabling two-factor authentication will make your account less secure. You will only need your password to sign in.
        </div>

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="account-btn-row">
            <a href="{% url 'profile' %}" class="account-btn account-btn-ghost">
              <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
              Cancel
            </a>
            <button type="submit" class="account-btn account-btn-danger">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
              Disable MFA
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
