{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token }}" />
  <title>Health Tracker</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  <link rel="stylesheet" href="{% static 'css/ui.css' %}" />
  <link rel="stylesheet" href="{% static 'css/saas.css' %}" />
</head>
<body>
  <a href="#auth-main-content" class="skip-to-content">Skip to main content</a>
  <main id="auth-main-content" role="main">
    <div class="auth-page">
      <div class="auth-card-wrapper">
        {% if messages %}
          {% for message in messages %}
            <div class="auth-alert auth-alert-{% if message.tags and message.tags != 'error' %}{{ message.tags }}{% elif message.tags == 'error' %}danger{% else %}info{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
        {% block auth_content %}{% endblock %}
      </div>
    </div>
  </main>
  <script src="{% static 'js/ui.js' %}"></script>
  <div class="toast-container position-fixed top-0 end-0 p-3" id="app-toast-container" style="z-index: 1080;" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
