{% extends 'base.html' %}
{% block content %}
<div class="container my-4">
  <h2 class="mb-4">{% if editing %}<i class="fas fa-edit me-2"></i>Edit Data Pipeline{% else %}<i class="fas fa-plus me-2"></i>Add Data Pipeline{% endif %}</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="name" class="form-label">Pipeline Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ entry.name|default:'' }}" required>
          </div>
          <div class="col-md-3 mb-3">
            <label for="category" class="form-label">Category</label>
            <select class="form-select" id="category" name="category" required>
              <option value="">Select Category</option>
              {% for value, label in categories %}
              <option value="{{ value }}" {% if entry.category == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3 mb-3">
            <label for="frequency" class="form-label">Frequency</label>
            <select class="form-select" id="frequency" name="frequency">
              <option value="manual" {% if entry.frequency == 'manual' %}selected{% endif %}>Manual</option>
              <option value="hourly" {% if entry.frequency == 'hourly' %}selected{% endif %}>Hourly</option>
              <option value="daily" {% if entry.frequency == 'daily' or not editing %}selected{% endif %}>Daily</option>
              <option value="weekly" {% if entry.frequency == 'weekly' %}selected{% endif %}>Weekly</option>
              <option value="monthly" {% if entry.frequency == 'monthly' %}selected{% endif %}>Monthly</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="source_description" class="form-label">Source Description</label>
            <input type="text" class="form-control" id="source_description" name="source_description" value="{{ entry.source_description|default:'' }}" placeholder="e.g., Withings API, Garmin Connect">
          </div>
          <div class="col-md-6 mb-3">
            <label for="destination_description" class="form-label">Destination Description</label>
            <input type="text" class="form-control" id="destination_description" name="destination_description" value="{{ entry.destination_description|default:'' }}" placeholder="e.g., Health Database, Analytics Store">
          </div>
        </div>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if entry.is_active or not editing %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active</label>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Pipeline</button>
          <a href="{% url 'data_pipeline_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
