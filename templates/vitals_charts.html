{% extends 'base.html' %}
{% load json_filters %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Vital Signs Charts</h2>
  <div>
    <button class="btn btn-outline-dark me-2" onclick="exportChartsPDF()">
      <i class="fas fa-file-pdf"></i> Export PDF
    </button>
    <a href="{% url 'vitals' %}" class="btn btn-secondary">Back to Vitals</a>
  </div>
</div>

<div class="row">
  <div class="col-md-12 mb-5">
    <h4>Weight (kg)</h4>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="col-md-12 mb-5">
    <h4>Heart Rate (bpm)</h4>
    <canvas id="hrChart"></canvas>
  </div>

  <div class="col-md-12 mb-5">
    <h4>Blood Pressure (mmHg)</h4>
    <canvas id="bpChart"></canvas>
  </div>
</div>

<!-- Moment.js is required for time axes in Chart.js 2.9.4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
<!-- Chart.js time adapter -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script>
  // Chart.js requires moment.js for time scale in version 2.9.4 usually, or we can use time scale.
  // We need to parse dates carefully. Since base.html has Chart.js, we can define our charts.

  var chartOptions = {
    scales: {
      xAxes: [{
        type: 'time',
        time: {
          parser: 'YYYY-MM-DD',
          tooltipFormat: 'll',
          unit: 'day'
        },
        scaleLabel: {
          display: true,
          labelString: 'Date'
        }
      }],
      yAxes: [{
        ticks: {
          beginAtZero: false
        }
      }]
    }
  };

  // Weight Chart
  var weightCtx = document.getElementById('weightChart').getContext('2d');
  new Chart(weightCtx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Weight (kg)',
        data: {{ weight_data|tojson }},
        backgroundColor: 'rgba(75, 192, 192, 0.2)',
        borderColor: 'rgba(75, 192, 192, 1)',
        borderWidth: 2,
        fill: false,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: chartOptions
  });

  // Heart Rate Chart
  var hrCtx = document.getElementById('hrChart').getContext('2d');
  new Chart(hrCtx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Heart Rate (bpm)',
        data: {{ hr_data|tojson }},
        backgroundColor: 'rgba(255, 99, 132, 0.2)',
        borderColor: 'rgba(255, 99, 132, 1)',
        borderWidth: 2,
        fill: false,
        pointRadius: 4,
        pointHoverRadius: 6
      }]
    },
    options: chartOptions
  });

  // Blood Pressure Chart
  var bpCtx = document.getElementById('bpChart').getContext('2d');
  new Chart(bpCtx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Systolic BP',
          data: {{ sys_bp_data|tojson }},
          backgroundColor: 'rgba(255, 159, 64, 0.2)',
          borderColor: 'rgba(255, 159, 64, 1)',
          borderWidth: 2,
          fill: false,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Diastolic BP',
          data: {{ dia_bp_data|tojson }},
          backgroundColor: 'rgba(54, 162, 235, 0.2)',
          borderColor: 'rgba(54, 162, 235, 1)',
          borderWidth: 2,
          fill: false,
          pointRadius: 4,
          pointHoverRadius: 6
        }
      ]
    },
    options: chartOptions
  });
</script>

<!-- PDF Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
function exportChartsPDF() {
  var element = document.querySelector('.row');
  if (!element) return;
  html2canvas(element, { scale: 2, useCORS: true }).then(function(canvas) {
    var pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    var imgWidth = 210;
    var imgHeight = canvas.height * imgWidth / canvas.width;
    var pageHeight = 297;
    var position = 0;
    var imgData = canvas.toDataURL('image/png');
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    var heightLeft = imgHeight - pageHeight;
    while (heightLeft > 0) {
      position = position - pageHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }
    pdf.save('vitals_charts.pdf');
  });
}
</script>
{% endblock %}
