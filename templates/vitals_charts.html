{% extends 'base.html' %}
{% load json_filters %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Vital Signs Charts</h2>
  <a href="{% url 'vitals' %}" class="btn btn-secondary">Back to Vitals</a>
</div>

<!-- Date Range Selector -->
<div class="card mb-4">
  <div class="card-body">
    <div class="row align-items-end">
      <div class="col-md-3">
        <label for="startDate" class="form-label"><strong>Start Date:</strong></label>
        <input type="date" id="startDate" class="form-control">
      </div>
      <div class="col-md-3">
        <label for="endDate" class="form-label"><strong>End Date:</strong></label>
        <input type="date" id="endDate" class="form-control">
      </div>
      <div class="col-md-2">
        <button id="applyDateFilter" class="btn btn-primary w-100">Apply Filter</button>
      </div>
      <div class="col-md-2">
        <button id="resetDateFilter" class="btn btn-outline-secondary w-100">Reset</button>
      </div>
      <div class="col-md-2">
        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" id="toggleMovingAvg">
          <label class="form-check-label" for="toggleMovingAvg">Moving Average</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="toggleAnomaly" checked>
          <label class="form-check-label" for="toggleAnomaly">Anomaly Detection</label>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-12 mb-5">
    <h4>Weight (kg)</h4>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="col-md-12 mb-5">
    <h4>Heart Rate (bpm)</h4>
    <canvas id="hrChart"></canvas>
  </div>

  <div class="col-md-12 mb-5">
    <h4>Blood Pressure (mmHg)</h4>
    <canvas id="bpChart"></canvas>
  </div>
</div>

<!-- Moment.js is required for time axes in Chart.js 2.9.4 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
<!-- Chart.js time adapter -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script>
  var chartOptions = {
    scales: {
      xAxes: [{
        type: 'time',
        time: {
          parser: 'YYYY-MM-DD',
          tooltipFormat: 'll',
          unit: 'day'
        },
        scaleLabel: {
          display: true,
          labelString: 'Date'
        }
      }],
      yAxes: [{
        ticks: {
          beginAtZero: false
        }
      }]
    }
  };

  var rawWeightData = {{ weight_data|tojson }};
  var rawHrData = {{ hr_data|tojson }};
  var rawSysBpData = {{ sys_bp_data|tojson }};
  var rawDiaBpData = {{ dia_bp_data|tojson }};

  var chartInstances = {};

  function computeMovingAverage(data, window) {
    if (data.length < window) window = data.length;
    var result = [];
    for (var i = 0; i < data.length; i++) {
      var start = Math.max(0, i - window + 1);
      var sum = 0;
      for (var j = start; j <= i; j++) {
        sum += data[j].y;
      }
      result.push({ x: data[i].x, y: parseFloat((sum / (i - start + 1)).toFixed(2)) });
    }
    return result;
  }

  function detectAnomalies(data) {
    var anomalyIndices = [];
    if (data.length < 3) return anomalyIndices;
    var mean = 0;
    for (var k = 0; k < data.length; k++) mean += data[k].y;
    mean /= data.length;
    var variance = 0;
    for (var m = 0; m < data.length; m++) variance += Math.pow(data[m].y - mean, 2);
    var stddev = Math.sqrt(variance / data.length);
    for (var n = 0; n < data.length; n++) {
      if (Math.abs(data[n].y - mean) > 2 * stddev) {
        anomalyIndices.push(n);
      }
    }
    return anomalyIndices;
  }

  function buildPointStyles(data, anomalyIndices, showAnomaly, normalColor) {
    var colors = [];
    var radii = [];
    for (var i = 0; i < data.length; i++) {
      if (showAnomaly && anomalyIndices.indexOf(i) !== -1) {
        colors.push('rgba(255, 0, 0, 1)');
        radii.push(8);
      } else {
        colors.push(normalColor);
        radii.push(4);
      }
    }
    return { colors: colors, radii: radii };
  }

  function filterByDate(data, startDate, endDate) {
    return data.filter(function(d) {
      if (startDate && d.x < startDate) return false;
      if (endDate && d.x > endDate) return false;
      return true;
    });
  }

  function renderAllCharts() {
    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var showMA = document.getElementById('toggleMovingAvg').checked;
    var showAnomaly = document.getElementById('toggleAnomaly').checked;
    var maWindow = 5;

    // Weight Chart
    var wData = filterByDate(rawWeightData, startDate, endDate);
    var wAnomalies = detectAnomalies(wData);
    var wStyles = buildPointStyles(wData, wAnomalies, showAnomaly, 'rgba(75, 192, 192, 1)');
    var wDatasets = [{
      label: 'Weight (kg)',
      data: wData,
      backgroundColor: 'rgba(75, 192, 192, 0.2)',
      borderColor: 'rgba(75, 192, 192, 1)',
      borderWidth: 2,
      fill: false,
      pointRadius: wStyles.radii,
      pointBackgroundColor: wStyles.colors,
      pointBorderColor: wStyles.colors,
      pointHoverRadius: 6
    }];
    if (showMA && wData.length >= 2) {
      wDatasets.push({
        label: 'Weight (Moving Avg)',
        data: computeMovingAverage(wData, Math.min(maWindow, wData.length)),
        borderColor: 'rgba(75, 192, 192, 0.5)',
        borderWidth: 2,
        borderDash: [5, 5],
        fill: false,
        pointRadius: 0,
        pointHoverRadius: 0
      });
    }
    if (chartInstances.weight) chartInstances.weight.destroy();
    chartInstances.weight = new Chart(document.getElementById('weightChart').getContext('2d'), {
      type: 'line', data: { datasets: wDatasets }, options: chartOptions
    });

    // Heart Rate Chart
    var hrData = filterByDate(rawHrData, startDate, endDate);
    var hrAnomalies = detectAnomalies(hrData);
    var hrStyles = buildPointStyles(hrData, hrAnomalies, showAnomaly, 'rgba(255, 99, 132, 1)');
    var hrDatasets = [{
      label: 'Heart Rate (bpm)',
      data: hrData,
      backgroundColor: 'rgba(255, 99, 132, 0.2)',
      borderColor: 'rgba(255, 99, 132, 1)',
      borderWidth: 2,
      fill: false,
      pointRadius: hrStyles.radii,
      pointBackgroundColor: hrStyles.colors,
      pointBorderColor: hrStyles.colors,
      pointHoverRadius: 6
    }];
    if (showMA && hrData.length >= 2) {
      hrDatasets.push({
        label: 'Heart Rate (Moving Avg)',
        data: computeMovingAverage(hrData, Math.min(maWindow, hrData.length)),
        borderColor: 'rgba(255, 99, 132, 0.5)',
        borderWidth: 2,
        borderDash: [5, 5],
        fill: false,
        pointRadius: 0,
        pointHoverRadius: 0
      });
    }
    if (chartInstances.hr) chartInstances.hr.destroy();
    chartInstances.hr = new Chart(document.getElementById('hrChart').getContext('2d'), {
      type: 'line', data: { datasets: hrDatasets }, options: chartOptions
    });

    // Blood Pressure Chart
    var sysData = filterByDate(rawSysBpData, startDate, endDate);
    var diaData = filterByDate(rawDiaBpData, startDate, endDate);
    var sysAnomalies = detectAnomalies(sysData);
    var diaAnomalies = detectAnomalies(diaData);
    var sysStyles = buildPointStyles(sysData, sysAnomalies, showAnomaly, 'rgba(255, 159, 64, 1)');
    var diaStyles = buildPointStyles(diaData, diaAnomalies, showAnomaly, 'rgba(54, 162, 235, 1)');
    var bpDatasets = [
      {
        label: 'Systolic BP',
        data: sysData,
        backgroundColor: 'rgba(255, 159, 64, 0.2)',
        borderColor: 'rgba(255, 159, 64, 1)',
        borderWidth: 2,
        fill: false,
        pointRadius: sysStyles.radii,
        pointBackgroundColor: sysStyles.colors,
        pointBorderColor: sysStyles.colors,
        pointHoverRadius: 6
      },
      {
        label: 'Diastolic BP',
        data: diaData,
        backgroundColor: 'rgba(54, 162, 235, 0.2)',
        borderColor: 'rgba(54, 162, 235, 1)',
        borderWidth: 2,
        fill: false,
        pointRadius: diaStyles.radii,
        pointBackgroundColor: diaStyles.colors,
        pointBorderColor: diaStyles.colors,
        pointHoverRadius: 6
      }
    ];
    if (showMA && sysData.length >= 2) {
      bpDatasets.push({
        label: 'Systolic BP (Moving Avg)',
        data: computeMovingAverage(sysData, Math.min(maWindow, sysData.length)),
        borderColor: 'rgba(255, 159, 64, 0.5)',
        borderWidth: 2,
        borderDash: [5, 5],
        fill: false,
        pointRadius: 0,
        pointHoverRadius: 0
      });
    }
    if (showMA && diaData.length >= 2) {
      bpDatasets.push({
        label: 'Diastolic BP (Moving Avg)',
        data: computeMovingAverage(diaData, Math.min(maWindow, diaData.length)),
        borderColor: 'rgba(54, 162, 235, 0.5)',
        borderWidth: 2,
        borderDash: [5, 5],
        fill: false,
        pointRadius: 0,
        pointHoverRadius: 0
      });
    }
    if (chartInstances.bp) chartInstances.bp.destroy();
    chartInstances.bp = new Chart(document.getElementById('bpChart').getContext('2d'), {
      type: 'line', data: { datasets: bpDatasets }, options: chartOptions
    });
  }

  document.getElementById('applyDateFilter').addEventListener('click', renderAllCharts);
  document.getElementById('resetDateFilter').addEventListener('click', function() {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
    renderAllCharts();
  });
  document.getElementById('toggleMovingAvg').addEventListener('change', renderAllCharts);
  document.getElementById('toggleAnomaly').addEventListener('change', renderAllCharts);

  // Initial render
  renderAllCharts();
</script>
{% endblock %}
