{% extends "base.html" %}

{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-header-title">Edit Measurement (Staff)</h1>
    <p class="page-header-subtitle">Advanced measurement editing</p>
  </div>
  <div class="page-header-actions">
    <a href="{% url 'review_measurements' %}" class="toolbar-btn">
      <i class="fas fa-arrow-left" aria-hidden="true"></i>
      <span class="d-none d-sm-inline">Back to Review</span>
    </a>
  </div>
</div>

<div class="form-card">
  <form method="POST" class="validated-form">
    {% csrf_token %}

    {% for field in form %}
    <div class="form-group-row mb-3">
      <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        {% for error in field.errors %}
        <div class="text-danger small">{{ error }}</div>
        {% endfor %}
      {% endif %}
    </div>
    {% endfor %}

    <div class="form-actions mt-4">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save me-1" aria-hidden="true"></i> Save Changes
      </button>
      <a href="{% url 'review_measurements' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
