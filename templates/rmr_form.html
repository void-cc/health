{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} RMR Entry</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="age" class="form-label">Age:</label>
      <input type="number" class="form-control" name="age" id="age" value="{% if editing and entry.age is not None %}{{ entry.age }}{% endif %}" placeholder="e.g. 30" required />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="weight_kg" class="form-label">Weight (kg):</label>
        <input type="number" step="0.1" class="form-control" name="weight_kg" id="weight_kg" value="{% if editing and entry.weight_kg is not None %}{{ entry.weight_kg }}{% endif %}" placeholder="e.g. 70" required />
      </div>
      <div class="col-md-6 mb-3">
        <label for="height_cm" class="form-label">Height (cm):</label>
        <input type="number" step="0.1" class="form-control" name="height_cm" id="height_cm" value="{% if editing and entry.height_cm is not None %}{{ entry.height_cm }}{% endif %}" placeholder="e.g. 175" required />
      </div>
    </div>

    <div class="mb-3">
      <label for="gender" class="form-label">Gender:</label>
      <select class="form-select" name="gender" id="gender" required>
        <option value="">-- Select --</option>
        <option value="M" {% if editing and entry.gender == 'M' %}selected{% endif %}>Male</option>
        <option value="F" {% if editing and entry.gender == 'F' %}selected{% endif %}>Female</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="formula" class="form-label">Formula:</label>
      <select class="form-select" name="formula" id="formula" required>
        <option value="">-- Select --</option>
        <option value="mifflin" {% if editing and entry.formula == 'mifflin' %}selected{% endif %}>Mifflin-St Jeor</option>
        <option value="harris" {% if editing and entry.formula == 'harris' %}selected{% endif %}>Harris-Benedict</option>
      </select>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Calculate & Save{% endif %}</button>
      <a href="{% url 'rmr_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
