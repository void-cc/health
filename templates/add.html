{% extends 'base.html' %}
{% load json_filters %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-header-title">Add Blood Tests</h1>
    <p class="page-header-subtitle">Record multiple blood test results at once</p>
  </div>
  <div class="page-header-actions">
    <a href="{% url 'index' %}" class="toolbar-btn">
      <i class="fas fa-arrow-left" aria-hidden="true"></i>
      <span class="d-none d-sm-inline">Dashboard</span>
    </a>
  </div>
</div>

<div class="form-card">
  <form method="POST" id="add-tests-form" class="validated-form">
    {% csrf_token %}

    <div class="form-group-row">
      <label for="date" class="form-label">
        Date <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
      </label>
      <input type="date" class="form-control" name="date" id="date" value="{{ date }}" required />
    </div>

    <div class="form-group-row">
      <label for="test_names" class="form-label">
        Blood Tests <span class="text-danger" aria-hidden="true">*</span><span class="visually-hidden"> required</span>
      </label>
      <select class="form-select" name="test_names" id="test_names" multiple required>
        {% for test in test_info %}
        <option value="{{ test }}">{{ test }}</option>
        {% endfor %}
      </select>
      <div class="form-text">Select one or more tests to record. Value fields will appear below.</div>
    </div>

    <!-- Dynamic value input fields -->
    <div id="test-input-fields"></div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-check me-1" aria-hidden="true"></i> Save Tests
      </button>
      <a href="{% url 'index' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script type="text/javascript">
  $(document).ready(function () {
    const selectTestNames = $('#test_names');
    selectTestNames.select2({
      placeholder: 'Select blood tests',
      allowClear: true,
    });

    const testInfo = {{ test_info | tojson | safe }};

    function generateInputFields(selectedTests) {
      let inputFields = '';
      selectedTests.forEach(function (testName) {
        const unit = testInfo[testName]['unit'];
        const normalMin = testInfo[testName]['normal_min'];
        const normalMax = testInfo[testName]['normal_max'];
        let placeholder = '';
        if (normalMin !== null && normalMax !== null) {
          placeholder = 'Normal: ' + normalMin + '–' + normalMax + ' ' + unit;
        }
        inputFields += `
          <div class="form-group-row">
            <label for="test_${testName}" class="form-label">${testName} <span class="text-muted">(${unit})</span></label>
            <input type="number" step="any" class="form-control" name="values[${testName}]" id="test_${testName}" placeholder="${placeholder}" required />
          </div>
        `;
      });
      $('#test-input-fields').html(inputFields);
    }

    selectTestNames.on('change', function () {
      const selectedTests = $(this).val();
      if (selectedTests && selectedTests.length) {
        generateInputFields(selectedTests);
      } else {
        $('#test-input-fields').html('');
      }
    });

    const preSelectedTests = selectTestNames.val();
    if (preSelectedTests && preSelectedTests.length) {
      generateInputFields(preSelectedTests);
    }
  });
</script>

{% endblock %}
