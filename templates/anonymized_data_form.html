{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Anonymized Data Report</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="report_title" class="form-label">Report Title:</label>
      <input type="text" class="form-control" name="report_title" id="report_title" value="{% if editing and entry.report_title %}{{ entry.report_title }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="report_type" class="form-label">Report Type:</label>
      <select class="form-select" name="report_type" id="report_type">
        <option value="population_health" {% if editing and entry.report_type == 'population_health' %}selected{% endif %}>Population Health</option>
        <option value="trend_analysis" {% if editing and entry.report_type == 'trend_analysis' %}selected{% endif %}>Trend Analysis</option>
        <option value="aggregate_stats" {% if editing and entry.report_type == 'aggregate_stats' %}selected{% endif %}>Aggregate Statistics</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="total_records" class="form-label">Total Records:</label>
      <input type="number" class="form-control" name="total_records" id="total_records" value="{% if editing %}{{ entry.total_records }}{% else %}0{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="anonymization_method" class="form-label">Anonymization Method:</label>
      <input type="text" class="form-control" name="anonymization_method" id="anonymization_method" value="{% if editing and entry.anonymization_method %}{{ entry.anonymization_method }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'anonymized_data_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
