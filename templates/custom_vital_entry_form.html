{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Custom Vital Entry</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="definition" class="form-label">Custom Vital:</label>
      <select class="form-select" name="definition" id="definition" required>
        <option value="">-- Select a vital --</option>
        {% for defn in definitions %}
        <option value="{{ defn.id }}" {% if editing and entry.definition.id == defn.id %}selected{% endif %}>
          {{ defn.name }}{% if defn.unit %} ({{ defn.unit }}){% endif %}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="value" class="form-label">Value:</label>
      <input type="number" step="0.01" class="form-control" name="value" id="value" value="{% if editing and entry.value is not None %}{{ entry.value }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'custom_vitals_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
