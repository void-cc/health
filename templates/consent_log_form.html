{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Consent Log</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="consent_type" class="form-label">Consent Type:</label>
      <input type="text" class="form-control" name="consent_type" id="consent_type" value="{% if editing and entry.consent_type %}{{ entry.consent_type }}{% endif %}" />
    </div>
    <div class="mb-3">
      <label for="version" class="form-label">Version:</label>
      <input type="text" class="form-control" name="version" id="version" value="{% if editing and entry.version %}{{ entry.version }}{% endif %}" />
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="accepted" id="accepted" {% if editing and entry.accepted %}checked{% endif %}>
      <label for="accepted" class="form-check-label">Accepted</label>
    </div>
    <div class="mb-3">
      <label for="ip_address" class="form-label">IP Address:</label>
      <input type="text" class="form-control" name="ip_address" id="ip_address" value="{% if editing and entry.ip_address %}{{ entry.ip_address }}{% endif %}" />
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'consent_log_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
