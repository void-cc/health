{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">{% if editing %}Edit{% else %}Add{% endif %} Metabolic Log</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="date" class="form-label">Date:</label>
      <input type="date" class="form-control" name="date" id="date" value="{% if editing %}{{ entry.date|date:'Y-m-d' }}{% else %}{{ date }}{% endif %}" required />
    </div>

    <div class="mb-3">
      <label for="blood_glucose" class="form-label">Blood Glucose (mg/dL):</label>
      <input type="number" step="0.1" class="form-control" name="blood_glucose" id="blood_glucose" value="{% if editing and entry.blood_glucose is not None %}{{ entry.blood_glucose }}{% endif %}" placeholder="e.g. 95" />
    </div>

    <div class="mb-3">
      <label for="insulin_level" class="form-label">Insulin Level (µU/mL):</label>
      <input type="number" step="0.1" class="form-control" name="insulin_level" id="insulin_level" value="{% if editing and entry.insulin_level is not None %}{{ entry.insulin_level }}{% endif %}" placeholder="e.g. 10" />
    </div>

    <div class="mb-3">
      <label for="notes" class="form-label">Notes:</label>
      <textarea class="form-control" name="notes" id="notes" rows="3">{% if editing and entry.notes %}{{ entry.notes }}{% endif %}</textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">{% if editing %}Update{% else %}Save{% endif %}</button>
      <a href="{% url 'metabolic_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
