{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
  <h2 class="mb-4 text-center">Define New Custom Vital</h2>
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">Name:</label>
      <input type="text" class="form-control" name="name" id="name" placeholder="e.g. Grip Strength" required />
    </div>

    <div class="mb-3">
      <label for="unit" class="form-label">Unit:</label>
      <input type="text" class="form-control" name="unit" id="unit" placeholder="e.g. kg, mmol/L" required />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="normal_min" class="form-label">Normal Min:</label>
        <input type="number" step="0.01" class="form-control" name="normal_min" id="normal_min" placeholder="e.g. 20" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="normal_max" class="form-label">Normal Max:</label>
        <input type="number" step="0.01" class="form-control" name="normal_max" id="normal_max" placeholder="e.g. 60" />
      </div>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description:</label>
      <textarea class="form-control" name="description" id="description" rows="3" placeholder="Optional description of this vital sign"></textarea>
    </div>

    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
      <button type="submit" class="btn btn-primary me-md-2">Save Definition</button>
      <a href="{% url 'custom_vitals_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
